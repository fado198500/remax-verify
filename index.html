<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>REMAX Verification</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial,sans-serif;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:450px;
background:#111;
border:2px solid #00ff66;
border-radius:20px;
padding:30px;
text-align:center;
box-shadow:0 0 20px rgba(0,255,102,.3);
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:15px;
}

.ok{
font-size:30px;
color:#00ff66;
font-weight:bold;
margin-bottom:15px;
}

.msg{
margin-bottom:20px;
color:#ddd;
}

.spec{
margin:10px 0;
font-size:18px;
}

.serial{
background:#000;
border:1px solid #00ff66;
padding:12px;
border-radius:10px;
margin-top:20px;
font-weight:bold;
}

.footer{
margin-top:15px;
font-size:12px;
color:#888;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">REMAX</div>

<div class="ok">✅ VERIFIED</div>

<div class="msg">
Product verification completed successfully
</div>

<div class="spec">🔋 Capacity: 60000mAh</div>
<div class="spec">⚡ Power Output: 100W PD</div>

<div class="serial">
Serial Number<br>
REMAX100W260001
</div>

<div class="footer">
Official Product Authentication
</div>

</div>

</body>
</html>
